{% extends "core/base.html" %} {% block content %}
<h1>Login</h1>

{% if form.errors %}
<p>Your username and password didn't match. Try again.</p>
{% endif %}

<form method="post">
  {% csrf_token %} {{ form.as_p }}
  <button type="submit">Log in</button>
</form>

<p><a href="{% url 'password_reset' %}">Forgot password?</a></p>
{% endblock %}
