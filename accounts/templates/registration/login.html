{% extends "core/base.html" %}

{% block content %}
  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-3 text-dark">
          <div class="card-body p-4 p-sm-5">
            <h2 class="card-title text-center fw-bold mb-4 text-uppercase tracking-wide">Login</h2>
            {% if form.errors %}
              <div class="alert alert-danger role='alert'">Your username and password didn't match. Please try again.</div>
            {% endif %}
            <form method="post" action="{% url 'login' %}">
              {% csrf_token %}
              <div class="form-floating mb-3">
                <input type="text"
                       name="username"
                       class="form-control"
                       id="id_username"
                       placeholder="Username"
                       required
                       autofocus />
                <label for="id_username">Username</label>
              </div>
              <div class="form-floating mb-4">
                <input type="password"
                       name="password"
                       class="form-control"
                       id="id_password"
                       placeholder="Password"
                       required />
                <label for="id_password">Password</label>
              </div>
              <button class="btn btn-primary w-100 py-2 fs-5 fw-bold text-uppercase"
                      type="submit">Sign In</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
