{% load static %}

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Age of Claritas
    {% if title %}- {{ title }}{% endif %}
  </title>
  <link rel="icon"
        type="image/png"
        href="{% static 'images/AgeOfClaritasLogo.png' %}" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    /* This prevents Tailwind's base browser resets from conflicting with Bootstrap's grid/buttons */
    @layer base {
      body {
        @all unset; /* Keeps Bootstrap in full control of base styles for now */
      }
    }
  </style>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
        rel="stylesheet" />
  <link href="{% static 'core/css/base.css' %}" rel="stylesheet" />
  {% block styles %}
  {% endblock styles %}
</head>
