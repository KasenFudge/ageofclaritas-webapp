<div class="d-lg-none fixed-bottom bg-white p-3 border-top shadow-lg" style="z-index: 1030;">
    <button class="btn btn-primary w-100 py-2 fw-bold d-flex align-items-center justify-content-center" type="button" data-bs-toggle="offcanvas" data-bs-target="#kinSidebar">
        <i class="bi bi-list fs-5 me-2"></i> View Kin List
    </button>
</div>

<aside class="col-lg-3 d-none d-lg-block border-end py-4 bg-light">
    <h5 class="text-muted text-uppercase small fw-bold tracking-wider mb-3">Kin Navigation</h5>
    <ul class="list-unstyled">
        {% for kin_nav in kin_list %}
            <li class="mb-2">
                <a href="{% url 'rulebook:kin_detail' kin_slug=kin_nav.slug %}" class="text-dark text-decoration-none fw-semibold d-block py-1 px-2 rounded hover-bg-light {% if kin_nav.id == kin.id %}text-primary bg-white border border-primary-subtle shadow-sm{% endif %}">
                    {{ kin_nav.name }}
                </a>
            </li>
        {% endfor %}
    </ul>
    <div class="mt-4 pt-3 border-top border-2 border-light">
        <a href="{% url 'rulebook:kin' %}" class="text-secondary text-decoration-none fw-semibold small hover-text-primary">
            <i class="bi bi-arrow-left"></i> Back to Kin Index
        </a>
    </div>
</aside>

<div class="offcanvas offcanvas-bottom bg-light text-dark" tabindex="-1" id="kinSidebar">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title fw-bold text-primary">Kin Navigation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <ul class="list-unstyled">
            {% for kin_nav in kin_list %}
                <li class="mb-2">
                    <a href="{% url 'rulebook:kin_detail' kin_slug=kin_nav.slug %}" class="text-dark text-decoration-none fw-semibold d-block py-1 px-2 rounded {% if kin_nav.id == kin.id %}text-primary bg-white border{% endif %}">
                        {{ kin_nav.name }}
                    </a>
                </li>
            {% endfor %}
        </ul>
        <div class="mt-4 pt-3 border-top">
            <a href="{% url 'rulebook:kin' %}" class="text-secondary text-decoration-none fw-semibold small">
                <i class="bi bi-arrow-left"></i> Back to Kin Index
            </a>
        </div>
    </div>
</div>
