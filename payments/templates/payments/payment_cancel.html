{% extends "base.html" %} {% block content %}
<div
  style="
    max-width: 600px;
    margin: 50px auto;
    text-align: center;
    font-family: sans-serif;
  "
>
  <div style="color: #d32f2f; font-size: 4rem; margin-bottom: 20px">✕</div>
  <h2>Checkout Canceled</h2>
  <p>Your transaction was canceled, and your credit card was not charged.</p>
  <p style="color: #666">
    If you had trouble with your payment method, you can try checking out again
    from your dashboard selection list.
  </p>

  <div style="margin-top: 30px">
    <a
      href="{% url 'accounts:upcoming_events' %}"
      style="
        background-color: #4f46e5;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
      "
    >
      Back to Registration List
    </a>
  </div>
</div>
{% endblock %}
