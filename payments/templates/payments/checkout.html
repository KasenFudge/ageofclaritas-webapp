{% extends "base.html" %}

{% load static %}

{% block title_tag %}
  Age of Claritas - Secure Checkout
{% endblock title_tag %}
{% block content %}
  <div class="container my-5" style="max-width: 600px;">
    <div class="card shadow-sm p-4">
      <h2 class="h4 mb-3 text-center">Secure Checkout</h2>
      <div class="alert alert-light border mb-4">
        <h6 class="text-muted text-uppercase small font-weight-bold">Settlement Summary</h6>
        <p class="mb-1 font-weight-bold">Total Due: ${{ amount_display }}</p>
        <small class="text-muted">Clearing outstanding registration balances.</small>
      </div>
      <form id="payment-form">
        <div id="payment-element" class="mb-3"></div>
        <div id="error-message"
             class="alert alert-danger d-none mb-3"
             role="alert"></div>
        <button id="submit-button" class="btn btn-primary btn-block w-100 py-2">
          <span id="button-text">Pay ${{ amount_display }} Now</span>
          <span id="spinner"
                class="spinner-border spinner-border-sm d-none"
                role="status"
                aria-hidden="true"></span>
        </button>
      </form>
    </div>
  </div>
  <script src="https://js.stripe.com/v3/"></script>
  <script>
    // 1. Pass the configuration tokens compiled by your Django view context layer securely
    const stripeKey = "{{ stripe_publishable_key }}";
    const clientSecret = "{{ client_secret }}";

    // Initialize Stripe JS Client Core instance
    const stripe = Stripe(stripeKey);

    // 2. Initialize the Payment Elements interface matching your intent profile configuration
    const options = { clientSecret: clientSecret };
    const elements = stripe.elements(options);

    // Create and mount the secure payment UI fields block container inside our HTML element target
    const paymentElement = elements.create('payment');
    paymentElement.mount('#payment-element');

    // 3. Handle Form Submission Events
    const form = document.getElementById('payment-form');
    const submitButton = document.getElementById('submit-button');
    const buttonText = document.getElementById('button-text');
    const spinner = document.getElementById('spinner');
    const errorDiv = document.getElementById('error-message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault(); // Prevent page refresh behavior

      // UI State Updates: Lock button to prevent double-charging race conditions
      submitButton.disabled = true;
      buttonText.textContent = "Processing Payment...";
      spinner.classList.remove('d-none');
      errorDiv.classList.add('d-none');

      // Execute asynchronous verification validation routing sequence via Stripe secure servers
      const { error } = await stripe.confirmPayment({
        elements,
        confirmParams: {
          // Return URL redirect path targeting successful verification pipelines
          return_url: `${window.location.origin}/payments/success/`,
        },
      });

      // This section will ONLY execute if an instantaneous client-side error occurs (e.g., declined cards)
      if (error) {
        submitButton.disabled = false;
        buttonText.textContent = "Pay ${{ amount_display }} Now";
        spinner.classList.add('d-none');
        
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('d-none');
      }
    });
  </script>
{% endblock content %}
